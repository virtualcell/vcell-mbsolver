name: Wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS : macos-15-intel (x86_64) + macos-15 (arm64)
        # Linux : ubuntu-latest (x86_64) + ubuntu-24.04-arm (arm64)
        # Windows: windows-2022 — pinned (not windows-latest) so CMake's
        #          "Visual Studio 17 2022" generator reliably finds VS.
        os: [macos-15-intel, macos-15, ubuntu-latest, ubuntu-24.04-arm, windows-2022]

    steps:
      # vcell-messaging / vcell-expressionparser are PRIVATE submodules, so the
      # default GITHUB_TOKEN cannot fetch them. Authenticate with SUBMODULE_TOKEN
      # the same way build-and-release.yml does.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for private submodules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive

      # --- Windows: prebuilt HDF5 + Boost from conda-forge (no compilation;
      #     ~1-2 min). conda lays files out under <env>/Library/{include,lib,bin}
      #     in a standard layout that CMake's module-mode find_package(HDF5/Boost)
      #     consumes via HDF5_ROOT/BOOST_ROOT. The Library/bin dir (HDF5 + its
      #     zlib/aec DLLs) is added to PATH so delvewheel vendors them.
      #     windows-2022 ships Miniconda at C:\Miniconda.
      - name: Set up HDF5 + Boost via conda-forge (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = "$env:RUNNER_TEMP\mbdeps"
          & "C:\Miniconda\condabin\conda.bat" create -y -p "$prefix" -c conda-forge hdf5 libboost-devel
          if ($LASTEXITCODE -ne 0) { exit 1 }

          $lib = "$prefix\Library" -replace '\\','/'
          $cmakeArgs = "-DHDF5_ROOT=$lib -DBOOST_ROOT=$lib -DCMAKE_PREFIX_PATH=$lib"
          # cibuildwheel reads CIBW_ENVIRONMENT_WINDOWS; scikit-build-core honors
          # CMAKE_ARGS/CMAKE_GENERATOR. PATH gets the HDF5 DLL dir for delvewheel.
          "CIBW_ENVIRONMENT_WINDOWS=CMAKE_GENERATOR=`"Visual Studio 17 2022`" CMAKE_GENERATOR_PLATFORM=x64 CMAKE_ARGS=`"$cmakeArgs`" PATH=`"$lib/bin;`$PATH`"" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: native

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  make_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git for private submodules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  # Publishing is dormant until a v* tag is pushed AND the PyPI project has a
  # trusted publisher configured for this repo + workflow (see README). Normal
  # pushes/PRs only produce downloadable wheel artifacts above.
  publish:
    name: Publish to PyPI
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write          # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
