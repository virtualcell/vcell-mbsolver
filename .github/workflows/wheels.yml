name: Wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS : macos-15-intel (x86_64) + macos-15 (arm64)
        # Linux : ubuntu-latest (x86_64) + ubuntu-24.04-arm (arm64)
        # Windows: windows-2022 — pinned (not windows-latest) so CMake's
        #          "Visual Studio 17 2022" generator reliably finds VS.
        os: [macos-15-intel, macos-15, ubuntu-latest, ubuntu-24.04-arm, windows-2022]

    steps:
      # vcell-messaging / vcell-expressionparser are PRIVATE submodules, so the
      # default GITHUB_TOKEN cannot fetch them. Authenticate with SUBMODULE_TOKEN
      # the same way build-and-release.yml does.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for private submodules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive

      # --- Windows: HDF5 + Boost via Conan (prebuilt binaries from Conan
      #     Center). Boost is header-only here, so nothing is compiled; HDF5
      #     downloads a prebuilt MSVC binary instead of building from source
      #     (~minutes vs ~40 min with vcpkg). full_deploy lays the packages out
      #     in a predictable tree so we can point CMake's module-mode finds at
      #     them and hand the HDF5 DLL dir to delvewheel for vendoring.
      - name: Set up Conan dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install "conan>=2.2"
          conan profile detect --force

          $of = "$env:RUNNER_TEMP/conan"
          conan install `
            --requires="hdf5/1.14.4" `
            --requires="boost/1.85.0" `
            -o "boost/*:header_only=True" `
            -o "hdf5/*:enable_cxx=True" `
            -o "hdf5/*:hl=True" `
            -g CMakeToolchain -g CMakeDeps `
            --deployer=full_deploy -of "$of" `
            --build=missing -s build_type=Release
          if ($LASTEXITCODE -ne 0) { exit 1 }

          $tc        = (Resolve-Path "$of/conan_toolchain.cmake").Path -replace '\\','/'
          $h5hdr     = Get-ChildItem -Path "$of/full_deploy" -Recurse -Filter "H5Cpp.h"   | Select-Object -First 1
          $hdf5root  = (Split-Path (Split-Path $h5hdr.FullName -Parent) -Parent) -replace '\\','/'
          $boosthdr  = Get-ChildItem -Path "$of/full_deploy" -Recurse -Filter "version.hpp" | Where-Object { $_.FullName -match '[\\/]boost[\\/]' } | Select-Object -First 1
          $boostroot = (Split-Path (Split-Path (Split-Path $boosthdr.FullName -Parent) -Parent) -Parent) -replace '\\','/'
          $hdf5dll   = Get-ChildItem -Path "$of/full_deploy" -Recurse -Filter "hdf5*.dll"  | Select-Object -First 1
          $hdf5bin   = $hdf5dll.DirectoryName -replace '\\','/'

          $cmakeArgs = "-DCMAKE_TOOLCHAIN_FILE=$tc -DHDF5_ROOT=$hdf5root -DBOOST_ROOT=$boostroot"
          # cibuildwheel reads CIBW_ENVIRONMENT_WINDOWS; scikit-build-core honors
          # CMAKE_ARGS/CMAKE_GENERATOR. PATH gets the HDF5 DLL dir so delvewheel
          # can vendor it into the repaired wheel.
          "CIBW_ENVIRONMENT_WINDOWS=CMAKE_GENERATOR=`"Visual Studio 17 2022`" CMAKE_GENERATOR_PLATFORM=x64 CMAKE_ARGS=`"$cmakeArgs`" PATH=`"$hdf5bin;`$PATH`"" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: native

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  make_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git for private submodules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  # Publishing is dormant until a v* tag is pushed AND the PyPI project has a
  # trusted publisher configured for this repo + workflow (see README). Normal
  # pushes/PRs only produce downloadable wheel artifacts above.
  publish:
    name: Publish to PyPI
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write          # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
