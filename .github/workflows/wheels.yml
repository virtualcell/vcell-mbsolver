name: Wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Matches the vcell-fvsolver runner set:
        #   macOS  : macos-15-intel (x86_64) + macos-15 (arm64)
        #   Linux  : ubuntu-latest (x86_64) + ubuntu-24.04-arm (arm64)
        #   Windows: windows-latest
        os: [macos-15-intel, macos-15, ubuntu-latest, ubuntu-24.04-arm, windows-latest]

    steps:
      # vcell-messaging / vcell-expressionparser are PRIVATE submodules, so the
      # default GITHUB_TOKEN cannot fetch them. Authenticate with SUBMODULE_TOKEN
      # the same way build-and-release.yml does.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for private submodules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive

      # --- Windows: HDF5 + Boost via vcpkg, and point CMake at them. ---
      - name: Set up vcpkg dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install --triplet x64-windows hdf5[cpp] boost
          $inst = "$env:RUNNER_TEMP/vcpkg/installed/x64-windows" -replace '\\','/'
          $tc   = "$env:RUNNER_TEMP/vcpkg/scripts/buildsystems/vcpkg.cmake" -replace '\\','/'
          # cibuildwheel reads these env vars; scikit-build-core honors CMAKE_ARGS / CMAKE_GENERATOR.
          "CIBW_ENVIRONMENT_WINDOWS=CMAKE_GENERATOR=`"Visual Studio 17 2022`" CMAKE_GENERATOR_PLATFORM=x64 CMAKE_ARGS=`"-DCMAKE_TOOLCHAIN_FILE=$tc -DVCPKG_TARGET_TRIPLET=x64-windows -DHDF5_ROOT=$inst -DCMAKE_PREFIX_PATH=$inst`"" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: native

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  make_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git for private submodules
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Initialize submodules
        shell: bash
        run: git submodule update --init --recursive
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  # Publishing is dormant until a v* tag is pushed AND the PyPI project has a
  # trusted publisher configured for this repo + workflow (see README). Normal
  # pushes/PRs only produce downloadable wheel artifacts above.
  publish:
    name: Publish to PyPI
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write          # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
