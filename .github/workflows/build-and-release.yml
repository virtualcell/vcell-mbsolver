name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_prefix: linux
          - os: macos-latest
            artifact_prefix: macos
          - os: windows-latest
            artifact_prefix: windows

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for private submodule
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Initialize submodules
        run: git submodule update --init --recursive
        shell: bash

      # Ubuntu dependencies
      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libhdf5-dev python3-dev python3-pip pybind11-dev libboost-dev libcurl4-openssl-dev
          pip3 install pybind11

      # macOS dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake hdf5 python pybind11 boost curl

      # Windows dependencies - simplified approach
      - name: Install Windows dependencies with vcpkg
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install minimal tools
          pip install pybind11 pytest
          
          # Setup vcpkg with binary cache to speed up builds
          Write-Host "Setting up vcpkg..."
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat"
          
          # Set environment variables for the rest of the workflow
          $vcpkgRoot = "$env:RUNNER_TEMP\vcpkg"
          $instPrefix = "$vcpkgRoot\installed\x64-windows"
          
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "INSTALLED_PREFIX=$instPrefix"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake"

      - name: Install dependencies via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkg = "$env:VCPKG_ROOT\vcpkg.exe"
          
          # Use --triplet flag and avoid building everything from scratch
          Write-Host "Installing HDF5, Boost (header-only), and CURL..."
          & $vcpkg install `
            hdf5[core,cpp]:x64-windows `
            boost:x64-windows `
            pybind11:x64-windows `
            pthread:x64-windows `
            curl:x64-windows `
            --triplet x64-windows `
            --clean-after-build
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "vcpkg install failed"
            exit 1
          }

      # Configure CMake
      - name: Configure CMake (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOPTION_TARGET_MESSAGING=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Configuring CMake for Windows..."
          $toolchain = $env:CMAKE_TOOLCHAIN_FILE
          
          if (-not (Test-Path $toolchain)) {
            Write-Error "Toolchain file not found: $toolchain"
            exit 1
          }
          
          Write-Host "Using toolchain: $toolchain"
          Write-Host "Using installed prefix: $env:INSTALLED_PREFIX"
          
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOPTION_TARGET_MESSAGING=ON `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configuration failed"
            exit 1
          }

      # Build
      - name: Build (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed"
            exit 1
          }

      # Run tests
      - name: Install test dependencies
        run: pip install pytest
        shell: bash

      - name: Run tests (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          cd build
          ctest --output-on-failure -j$(nproc)

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd build
          ctest --output-on-failure --parallel $env:NUMBER_OF_PROCESSORS
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tests failed"
            exit 1
          }

      # Prepare artifacts
      - name: Prepare artifacts (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp build/bin/MovingBoundarySolver artifacts/MovingBoundarySolver-${{ matrix.artifact_prefix }}
          cp build/bin/libMovingBoundaryLib.a artifacts/libMovingBoundaryLib-${{ matrix.artifact_prefix }}.a
          cp build/bin/vcellmbsolver_py*.so artifacts/ 2>/dev/null || true

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item -Path build\bin\Release\MovingBoundarySolver.exe -Destination artifacts\MovingBoundarySolver-${{ matrix.artifact_prefix }}.exe -Force
          Copy-Item -Path build\bin\Release\MovingBoundaryLib.lib -Destination artifacts\MovingBoundaryLib-${{ matrix.artifact_prefix }}.lib -Force
          Get-ChildItem -Path build\bin\Release\vcellmbsolver_py*.pyd -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination artifacts\ -Force
          }

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-artifacts
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: all-artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display release info
        run: |
          echo "Release created successfully!"
          find all-artifacts -type f -exec echo "  - {}" \;
